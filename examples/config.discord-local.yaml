plugins:
  enabled:
  - a2a

a2a:
  enabled: true
  identity:
    name: primary_agent
    description: Primary Hermes A2A profile
  server:
    port: 41731
    auth_token: "[REDACTED]"
  wake:
    port: 47644
    secret: "[REDACTED]"
    session_ref:
      platform: discord
      chat_id: "<discord-channel-or-thread-id>"
  agents:
  - name: reviewer_agent
    url: http://127.0.0.1:41732
    description: Local reviewer profile
    auth_token: "[REDACTED]"
    enabled: true
    tags: [local]
    trust_level: trusted

# Generated compatibility output, not canonical user input. The installer/migration
# regenerates this from a2a.wake.session_ref plus Hermes session history.
webhook:
  enabled: true
  extra:
    port: 47644
    routes:
      a2a_trigger:
        secret: "[REDACTED]"
        prompt: "[A2A trigger]"
        deliver: discord
        deliver_extra:
          chat_id: "<discord-channel-or-thread-id>"
        source:
          platform: discord
          chat_type: group
          chat_id: "<discord-channel-or-thread-id>"
          user_id: "<derived-from-session-history>"
          user_name: "<derived-from-session-history>"
      a2a_dashboard:
        secret: "[REDACTED]"
        prompt: "[A2A dashboard]"
