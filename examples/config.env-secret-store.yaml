plugins:
  enabled:
  - a2a

a2a:
  enabled: true
  identity:
    name: secure_agent
    description: Hermes A2A profile with env-backed secrets
  server:
    port: 41731
    auth_token_env: A2A_AUTH_TOKEN
  wake:
    port: 47644
    secret_env: A2A_WEBHOOK_SECRET
    session_ref:
      platform: discord
      chat_id: "<discord-channel-or-thread-id>"
  agents:
  - name: reviewer_agent
    url: http://127.0.0.1:41732
    description: Local reviewer profile
    auth_token_env: A2A_AGENT_REVIEWER_TOKEN
    enabled: true
    tags: [local]
    trust_level: trusted
