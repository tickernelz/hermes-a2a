plugins:
  enabled:
  - a2a

a2a:
  enabled: true
  identity:
    name: mobile_agent
    description: Hermes A2A profile using a Telegram topic
  server:
    port: 41731
    auth_token: "[REDACTED]"
  wake:
    port: 47644
    secret: "[REDACTED]"
    session_ref:
      platform: telegram
      chat_id: "<telegram-chat-id>"
      thread_id: "<optional-topic-thread-id>"
